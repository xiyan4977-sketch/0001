name: 飆股狙擊雷達

on:
  schedule:
    # GitHub Action 使用 UTC 時間。
    # 台灣時間早上 08:50 = UTC 時間 00:50
    # 這樣設定會在每週一到週五的台股開盤前 10 分鐘自動啟動程式
    - cron: '50 0 * * 1-5' 
  workflow_dispatch: # 保留這個按鈕，讓你可以隨時手動點擊啟動測試

jobs:
  run-sniper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 記得安裝 BeautifulSoup 和 requests
        pip install requests beautifulsoup4

    - name: Run Sniper Bot
      run: python 001.py # 這裡的 main.py 請換成你 Python 檔案的名稱
      
      # 設定時區為台北時間，確保 Python 程式抓到的 now() 是台灣時間
      env:
        TZ: Asia/Taipei
