name: 台股開盤執行任務

on:
  schedule:
    # 這裡使用 Cron 語法，時間是 UTC (世界協調時間)
    # 台灣時間 09:00 = UTC 01:00
    # 我們設定 08:55 (UTC 00:55) 啟動，給環境一點準備時間
    - cron: '00 0 * * 0-6'
  workflow_dispatch: # 讓你可以手動按按鈕測試執行

jobs:
  run-stock-script:
    runs-on: ubuntu-latest # 使用最新的 Linux 環境

    steps:
      - name: 複製專案程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 選擇你的 Python 版本

      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 執行 Python 腳本
        env:
          # 如果你有 API Key 或帳密，放在這裡（詳見第四步）
          STOCK_PASSWORD: ${{ secrets.STOCK_PASSWORD }}
        run: python 001.py
