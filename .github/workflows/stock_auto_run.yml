name: 飆股狙擊雷達

on:
  schedule:
    # 台灣時間早上 08:50 (UTC 時間 00:50) 自動啟動
    - cron: '50 0 * * 1-5' 
  workflow_dispatch: # 保留手動啟動按鈕

jobs:
  run-sniper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Sniper Bot
      run: python 001.py # 執行你的 001.py

      # 強制設定時區為台北時間
      env:
        TZ: Asia/Taipei

